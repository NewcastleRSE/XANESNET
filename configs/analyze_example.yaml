seed: 42

selectors:
  - selector_type: "all"

  - selector_type: "random"
    p: 0.1

  - selector_type: "index_range"
    start: 0
    end: 50

collectors:
  - collector_type: "error_metric"
    loss_type: "l1"
  
  - collector_type: "error_metric"
    loss_type: "mse"

aggregators:
  - aggregator_type: "scalar"
    percentiles: [25, 50, 75, 90, 95]

plotters:
  - plotter_type: scalar
    value_key: mse  # or any other scalar from per_sample
    plot_type: violin  # histogram, boxplot, violin
    bins: 50

  - plotter_type: scalar
    value_key: l1  # or any other scalar from per_sample
    plot_type: violin  # histogram, boxplot, violin
    bins: 50
    
  - plotter_type: spectra
    value_keys: ["mse"]
    sort_by_value: True
    

# Reporting
reporters:
  - type: "markdown"
  - type: "csv"
