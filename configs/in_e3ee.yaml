seed: 2025
device: cuda

datasource:
  datasource_type: pmgjson
  json_path: /media/hendrik/ExternalSSD/final_data/omnixas_test/


dataset:
  # general:
  dataset_type: e3ee_mp
  root: ./data/omnixas/processed_train_e3ee/  # Where should the processed data be stored
  preload: True                           # Preload dataset into RAM if True; otherwise load on-the-fly
  skip_prepare: True
  split_ratios: [0.8, 0.2]
  # params:
  cutoff: 6.0
  max_num_neighbors: 32
  use_path_branch: False
  max_paths_per_structure: 128
  graph_method: voronoi
  min_facet_area: 5%
  # attention graph (used by attention branches):
  att_cutoff: 10.0
  att_max_num_neighbors: 128
  att_graph_method: radius
  att_min_facet_area: null
  att_cov_radii_scale: 1.5
  # mp
  num_workers: 4

model:
  # general:
  model_type: e3ee
  # params:
  out_size: 173
  max_z: 100
  atom_emb_dim: 64
  atom_hidden_dim: 128
  atom_layers: 3
  local_cutoff: 6.0
  rbf_dim: 32
  energy_rbf_dim: 48
  scatter_dim: 128
  latent_dim: 128
  head_hidden_dim: 128
  e3nn_irreps: "64x0e + 32x1o + 16x2e"
  e3nn_irreps_message: "16x0e + 8x1o + 4x2e"
  e3nn_lmax: 2
  out_mlp_layers: 3
  use_invariant_branch: True
  use_attention_branch: True
  use_equivariant_branch: True
  use_eq_attention_branch: True
  use_conv_branch: False
  use_eq_conv_branch: False
  use_path_branch: False
  residual_scale_init: 0.1
  attention_heads: 4
  attention_rbf_dim: 16
  attention_lmax: 2
  attention_irreps: "32x0e + 16x1o + 8x2e"
  att_cutoff: 10.0
  conv_use_gate: True

trainer:
  # general:
  trainer_type: basic
  batch_size: 16
  shuffle: True
  drop_last: False
  num_workers: 0
  # params:
  epochs: 500
  learning_rate: 0.001
  optimizer: Adam
  max_norm: null
  validation_interval: 10
  lr_warmup: True
  warmup_steps: 500
  loss:
    loss_type: mse
  regularizer:
    regularizer_type: none
  lr_scheduler:
    lr_scheduler_type: linear
    start_factor: 1.0
    end_factor: 0.1
    total_iters: 40
  early_stopper:
    early_stopper_type: basic
    patience: 25
    min_delta: 0.001
    restore_best: True

strategy:
  # general:
  strategy_type: single
  weight_init: xavier_uniform
  bias_init: zeros
  checkpoint_interval: 25
  # params: