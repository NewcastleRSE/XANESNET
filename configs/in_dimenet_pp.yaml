seed: 2025
device: cuda

datasource:
  datasource_type: xyzspec
  xyz_path: ./data/fe/xyz_train
  xanes_path: ./data/fe/xanes_train


dataset: 
  # general:
  dataset_type: geometric
  root: ./data/fe/processed_train/  # Where should the processed data be stored
  preload: True                    # Preload dataset into RAM if True; otherwise load on-the-fly
  force_prepare: True
  split_ratios: [0.8, 0.2]

model:
  # general:
  model_type: dimenet++
  # params:
  hidden_channels: 128
  out_channels: 226
  num_blocks: 6
  int_emb_size: 64
  basis_emb_size: 8
  out_emb_channels: 256
  num_spherical: 7
  num_radial: 6
  cutoff: 5.0
  max_num_neighbors: 32
  envelope_exponent: 5
  num_before_skip: 1
  num_after_skip: 2
  num_output_layers: 3
  act: swish
  output_initializer: zeros

trainer:
  # general:
  trainer_type: nntrainer
  batch_size: 1
  shuffle: True
  drop_last: False
  num_workers: 0
  # params:
  epochs: 500
  learning_rate: 0.001
  optimizer: Adam
  validation_interval: 10
  loss:
    loss_type: mse
  regularizer:
    regularizer_type: none
  lr_scheduler:
    lr_scheduler_type: linear
    start_factor: 1.0 
    end_factor: 0.1
    total_iters: 40
  early_stopper:
    early_stopper_type: basic 
    patience: 25
    min_delta: 0.001
    restore_best: True
  
strategy:
  # general:
  strategy_type: single
  checkpoint_interval: 25
  # params: