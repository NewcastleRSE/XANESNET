seed: 20260001
device: cuda

datasource:
  datasource_type: pmgjson
  json_path: /media/hendrik/ExternalSSD/final_data/omnixas_test/

dataset:
  # general:
  dataset_type: envembed
  root: ./data/omnixas/processed_train/  # Where should the processed data be stored
  preload: True                    # Preload dataset into RAM if True; otherwise load on-the-fly
  skip_prepare: False
  split_ratios: [0.8, 0.2]
  # params:
  widths_eV: [0.2, 1.0, 2.0, 4.0]
  basis_stride: 4
  env_radius: 6.0
  # descriptors:
  descriptors:
    - descriptor_type: wacsf
      r_min: 1.0
      r_max: 6.0
      n_g2: 16
      n_g4: 32

model:
  # general:
  model_type: envembed
  # params:
  in_size: auto # dimensionality of the descriptor features
  kgroups: auto # output gaussian dimensions from the dataset spectral basis

trainer:
  # general:
  trainer_type: basic
  batch_size: 100
  shuffle: True
  drop_last: False
  num_workers: 4
  # params:
  epochs: 100000
  learning_rate: 0.001
  optimizer: Adam
  max_norm: null
  validation_interval: 10
  lr_warmup: True
  warmup_steps: 500
  loss:
    loss_type: mse
  regularizer:
    regularizer_type: none
  lr_scheduler:
    lr_scheduler_type: linear
    start_factor: 1.0 
    end_factor: 0.1
    total_iters: 100
  early_stopper:
    early_stopper_type: time 
    time_limit_seconds: 28800  # 8 hours
    restore_best: True
  
strategy:
  # general:
  strategy_type: single
  weight_init: xavier_uniform
  bias_init: zeros
  checkpoint_interval: 25
  # params:



