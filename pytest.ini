[pytest]
# Root for test discovery. Subfolders under tests/ can be run individually:
#   pytest tests/gemnet/         # GemNet + GemNet-OC only
#   pytest tests/                # full suite
#   pytest -m periodic           # only periodic-data tests
#   pytest -m "not slow"         # skip slow tests
testpaths = tests

# Custom markers — keep this list in sync with @pytest.mark usage.
markers =
    periodic: tests operating on periodic (PBC) structures.
    molecule: tests operating on non-periodic molecular inputs.
    parity: parity tests comparing against fairchem reference implementations.
    slow: long-running tests (end-to-end forward passes).
