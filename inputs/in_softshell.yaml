dataset:
  type: softshell
  root_path: data/fe/processed_train  # Path to save processed dataset
  xyz_path: data/fe/xyz_train         # Path to the directory containing .XYZ files
  xanes_path: data/fe/xanes_train     # Path to the directory containing XANES files
  params:
    preload: True                    # Preload dataset into RAM if True; otherwise load on-the-fly
    widths_eV: [0.2, 1.0, 2.0, 4.0]
    basis_stride: 4                  # Value must be consistent with hyperparams/basis_stride


descriptors:
  - type: mace
    params:
      invariants_only: True
      num_layers: 2
      absorber_atom_only: False
#  - type: wacsf
#    params:
#      absorber_atom_only: False
#      r_min: 1.0
#      r_max: 6.0
#      n_g2: 16
#      n_g4: 32

model:
  type: softshell
  params:
      n_shells: 4
      max_radius_angs: 7.0
      init_width: 0.8
      use_gating: True
      head_hidden: 256
      head_depth: 3
      dropout: 0.1
  weights:
      kernel: kaiming_uniform
      bias: zeros
      seed: 2025
  weights_params:
      mode: fan_in
      nonlinearity: relu

hyperparams:
  batch_size: 32
  epochs: 500
  n_earlystop: 100
  lr: 0.0002
  optimizer: AdamW
  seed: 2021
  loss: specplus
  loss_params:
    alpha: 0.65
    beta: 0.35
    gamma: 0.25
    huber_delta: 0.01
    kappa_peak: 0.05
#  loss: mw_ssim1d
#  loss_params:
#    spec_size: 226
#    fractions: [0.05, 0.10, 0.25, 0.33, 0.50, 1.00]
#    weights: [0.15, 0.20, 0.20, 0.15, 0.15, 0.15]


kfold: False
#kfold_params:
#  n_splits: 3
#  n_repeats: 1
#  seed: 2021

bootstrap: False
#bootstrap_params:
#  n_boot: 3
#  n_size: 1.0
#  weight_seed: [97, 39, 22]

ensemble: False
#ensemble_params:
#  n_ens: 3
#  weight_seed: [97, 39, 22]

lr_scheduler: False
